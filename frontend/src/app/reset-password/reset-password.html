<div
  style="
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem;
    font-family: sans-serif;
  "
>
  <div
    style="
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    "
  >
    <h2 style="text-align: center; color: #333; margin-bottom: 1.5rem">Nueva Contraseña</h2>

    @if (errorMessage) {
      <div
        style="
          background: #ffebee;
          color: #dc3545;
          padding: 0.8rem;
          border-radius: 4px;
          margin-bottom: 1.5rem;
          text-align: center;
        "
      >
        {{ errorMessage }}
      </div>
    }

    @if (token && !errorMessage) {
      <p style="color: #666; font-size: 0.9rem; margin-bottom: 1.5rem">
        Ingresá tu nueva clave de acceso a continuación.
      </p>

      <form (ngSubmit)="onSubmit()">
        <div style="margin-bottom: 1rem">
          <label style="display: block; margin-bottom: 0.5rem; color: #555">Contraseña Nueva</label>
          <input
            type="password"
            [(ngModel)]="newPassword"
            name="newPassword"
            style="
              width: 100%;
              padding: 0.8rem;
              border: 1px solid #ccc;
              border-radius: 4px;
              box-sizing: border-box;
            "
            placeholder="Mínimo 6 caracteres"
          />
        </div>

        <div style="margin-bottom: 1.5rem">
          <label style="display: block; margin-bottom: 0.5rem; color: #555"
            >Confirmar Contraseña</label
          >
          <input
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            style="
              width: 100%;
              padding: 0.8rem;
              border: 1px solid #ccc;
              border-radius: 4px;
              box-sizing: border-box;
            "
            placeholder="Repetí tu contraseña"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading"
          style="
            width: 100%;
            padding: 1rem;
            background: #0033a0;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
          "
        >
          {{ loading ? 'Actualizando...' : 'Cambiar Contraseña' }}
        </button>
      </form>
    } @else if (!token) {
      <div style="text-align: center">
        <a routerLink="/login" style="color: #0033a0; text-decoration: none; font-weight: bold"
          >← Volver al login</a
        >
      </div>
    }
  </div>
</div>
