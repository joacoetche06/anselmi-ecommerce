<div
  style="
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    font-family: sans-serif;
  "
>
  <div
    style="
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    "
  >
    <h2 style="text-align: center; color: #333; margin-bottom: 1.5rem">Iniciar Sesión</h2>

    @if (errorMessage) {
      <div
        style="
          background: #ffebee;
          color: #dc3545;
          padding: 0.8rem;
          border-radius: 4px;
          margin-bottom: 1rem;
          text-align: center;
        "
      >
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()">
      <div style="margin-bottom: 1rem">
        <label style="display: block; margin-bottom: 0.5rem; color: #555">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          style="
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
          "
          placeholder="ejemplo@correo.com"
        />
      </div>

      <div style="margin-bottom: 1.5rem">
        <label style="display: block; margin-bottom: 0.5rem; color: #555">Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          style="
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
          "
          placeholder="Tu contraseña"
        />
      </div>

      <button
        type="submit"
        style="
          width: 100%;
          padding: 1rem;
          background: #0056b3;
          color: white;
          border: none;
          border-radius: 4px;
          font-size: 1.1rem;
          cursor: pointer;
          font-weight: bold;
        "
      >
        Ingresar
      </button>
    </form>
  </div>
</div>
