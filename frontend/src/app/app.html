<header
  style="
    background: #f8f9fa;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ddd;
    font-family: sans-serif;
  "
>
  <h2 style="margin: 0; color: #0056b3">Anselmi</h2>

  <div style="display: flex; gap: 1rem; align-items: center">
    <a
      routerLink="/cart"
      style="
        padding: 0.5rem 1rem;
        background: #ffc107;
        color: #333;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
      "
    >
      🛒 Mi Pedido ({{ cartItemCount }})
    </a>

    @if (isLoggedIn) {
      <button
        (click)="logout()"
        style="
          padding: 0.5rem 1rem;
          background: #dc3545;
          color: white;
          border: none;
          border-radius: 4px;
          font-weight: bold;
          cursor: pointer;
        "
      >
        Cerrar Sesión
      </button>
    } @else {
      <a
        routerLink="/login"
        style="
          padding: 0.5rem 1rem;
          background: #333;
          color: white;
          text-decoration: none;
          border-radius: 4px;
          font-weight: bold;
          cursor: pointer;
        "
      >
        Soy Mayorista / Iniciar Sesión
      </a>
    }
  </div>
</header>

<router-outlet></router-outlet>
<div
  style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  "
>
  <div
    style="
      background: white;
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      border: 1px solid #eee;
      font-family: sans-serif;
      font-size: 0.9rem;
      max-width: 250px;
      text-align: center;
      transition: all 0.3s ease;
    "
  >
    <strong>{{ currentPhrase }}</strong>
  </div>

  <a
    href="https://wa.me/5491112345678?text=Hola,%20necesito%20asesoramiento%20con%20unos%20productos."
    target="_blank"
    style="
      background: #25d366;
      color: white;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      font-family: sans-serif;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      gap: 8px;
    "
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      fill="currentColor"
      viewBox="0 0 16 16"
    >

</div>
